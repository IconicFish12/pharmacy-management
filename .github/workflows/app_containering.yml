name: Application Container image building and push to Docker Hub
on: 
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
    secrets:
      docker_username:
        description: 'Docker Hub username to store container image' 
        required: true
      docker_token: 
        description: 'Docker Hub User PAT'
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps: 
      - name: Github Repository checkout
        uses: actions/checkout@v6

      - name: Docker Hub Login
        uses: docker/login-action@v4
        with: 
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Qemu Virtl Set up
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Validate build configuration
        uses: docker/build-push-action@v7
        with:
          call: check

      - name: Build and push 
        uses: docker/build-push-action@v7
        with: 
          context: .
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ secrets.docker_username }}/pharma-ease-backend:${{ inputs.image_tag }}
